[feature.nbdev.dependencies]
nbdev = ">=2.2.10,<2.3"

[feature.nbdev.tasks]
clean = "nbdev_clean --clear_all"

[feature.cuda]
platforms = ["linux-64"]
system-requirements = { cuda = "11" }
channels = ["conda-forge"]
dependencies = { tensorflow="*"}

[feature.n2v.pypi-dependencies]
n2v = ">=0.3.2,<0.3.3"

[feature.cellpose]
platforms = ["linux-64"]
channels = ["nvidia", "pytorch", "conda-forge"]

[feature.cellpose.dependencies]
python = "==3.11"
numpy = "<2"
scipy = ">=1.10.1,<1.11"
natsort = ">=8.4.0,<8.5"
numba = ">=0.58.1,<0.59"
pyqt = ">=5.15.9,<5.16"

[feature.cellpose.pypi-dependencies]
cellpose = {version=">=3.0.10, <3.1", extras=["gui"]}

[feature.pytorch]
channels = ["pytorch", "conda-forge"]

[feature.pytorch.dependencies]
pytorch = {version=">=2.3.1,<2.4", channel="pytorch"}

[feature.pytorch-gpu]
channels = ["nvidia", "pytorch", "conda-forge"]
system-requirements = { cuda = "11" }

[feature.pytorch-gpu.dependencies]
pytorch-cuda = {version="11.8.*", channel="pytorch"}

[environments]
docs = { features=["docs"], solve-group="default" }
dev = { features=["dev"], solve-group="default" }
nextflow = { features=["nextflow"], solve-group="default" }
jupyter = { features=["jupyter"], solve-group="default" }
n2v = {features=["n2v", "cuda"], solve-group="default" }
nbdev = {features=["nbdev"], no-default-feature = true}
cellpose = {features=["cellpose", "pytorch"], no-default-feature = true}
cellpose-gpu = {features=["cellpose", "pytorch", "pytorch-gpu"], no-default-feature = true}
